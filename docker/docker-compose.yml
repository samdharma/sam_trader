services:
  sam-trader:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sam-trader:latest
    container_name: sam-trader
    restart: unless-stopped
    networks:
      - sam-net
    depends_on:
      sam-postgres:
        condition: service_healthy
      sam-redis:
        condition: service_healthy
    volumes:
      - ../config:/opt/sam_trader/config:ro
      - ../data/catalog:/opt/sam_trader/data/catalog:rw
      - ../logs:/opt/sam_trader/logs:rw
    environment:
      - PYTHONPATH=/opt/sam_trader/src
      - PYTHONUNBUFFERED=1
      - TRADER_ID=${TRADER_ID:-sam_trader}
      - SAM_ENV=${SAM_ENV:-paper}
      - POSTGRES_HOST=${POSTGRES_HOST:-sam-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-sam_trader}
      - POSTGRES_USER=${POSTGRES_USER:-sam}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sam_secret}
      - REDIS_HOST=${REDIS_HOST:-sam-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - WAIT_FOR_IB_GATEWAY=${WAIT_FOR_IB_GATEWAY:-1}
      - IB_ENABLED=${IB_ENABLED:-false}
      - IB_TRADING_MODE=${IB_TRADING_MODE:-paper}
      - IB_GATEWAY_HOST=${IB_GATEWAY_HOST:-sam-ib-gateway}
      - IB_GATEWAY_PORT=${IB_GATEWAY_PORT:-4004}
      - IB_GATEWAY_CLIENT_ID=${IB_GATEWAY_CLIENT_ID:-11}
      - IB_ACCOUNT_ID=${IB_ACCOUNT_ID:-}
      - IB_SYMBOLS=${IB_SYMBOLS:-}
      - IB_READ_ONLY_API=${IB_READ_ONLY_API:-false}
      - IB_MARKET_DATA_TYPE=${IB_MARKET_DATA_TYPE:-REALTIME}
      - WAIT_FOR_FUTU_OPEND=${WAIT_FOR_FUTU_OPEND:-1}
      - FUTU_ENABLED=${FUTU_ENABLED:-false}
      - FUTU_OPEND_HOST=${FUTU_OPEND_HOST:-sam-futu-opend}
      - FUTU_OPEND_PORT=${FUTU_OPEND_PORT:-11111}
      - FUTU_ACCOUNT_ID=${FUTU_ACCOUNT_ID:-}
      - FUTU_ACCOUNT_PWD_MD5=${FUTU_ACCOUNT_PWD_MD5:-}
      - FUTU_TRD_ENV=${FUTU_TRD_ENV:-SIMULATE}
      - FUTU_TRD_MARKET=${FUTU_TRD_MARKET:-US}
      - FUTU_UNLOCK_PWD_MD5=${FUTU_UNLOCK_PWD_MD5:-}
      - STATE_SAVE_ENABLED=${STATE_SAVE_ENABLED:-true}
      - STATE_LOAD_ENABLED=${STATE_LOAD_ENABLED:-true}
      - ACTOR_JOURNAL_ENABLED=${ACTOR_JOURNAL_ENABLED:-true}
      - ACTOR_HEALTH_ENABLED=${ACTOR_HEALTH_ENABLED:-true}
      - ACTOR_BAR_RESUB_ENABLED=${ACTOR_BAR_RESUB_ENABLED:-true}
      - BUNDLES_PATH=${BUNDLES_PATH:-config/bundles.yaml}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | grep -q sam_trader.main"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  sam-postgres:
    image: postgres:16-alpine
    container_name: sam-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sam_trader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sam-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sam} -d ${POSTGRES_DB:-sam_trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sam-redis:
    image: redis:7-alpine
    container_name: sam-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sam-net
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sam-futu-opend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.futu-opend
      platforms:
        - linux/amd64
    image: sam-futu-opend:latest
    container_name: sam-futu-opend
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "${FUTU_OPEND_PORT:-11111}:11111"
      - "${FUTU_OPEND_TELNET_PORT:-22222}:22222"
    environment:
      FUTU_ACCOUNT_ID: ${FUTU_ACCOUNT_ID:-}
      FUTU_ACCOUNT_PWD_MD5: ${FUTU_ACCOUNT_PWD_MD5:-}
      FUTU_OPEND_IP: ${FUTU_OPEND_IP:-0.0.0.0}
      FUTU_OPEND_PORT: ${FUTU_OPEND_PORT:-11111}
      FUTU_OPEND_TELNET_PORT: ${FUTU_OPEND_TELNET_PORT:-22222}
    volumes:
      - futu_opend_data:/home/futu/.com.futunn.FutuOpenD
    networks:
      - sam-net
    profiles:
      - futu
    healthcheck:
      test: ["CMD-SHELL", "/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sam-ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: sam-ib-gateway
    restart: unless-stopped
    ports:
      - "${IB_GATEWAY_PORT:-4004}:4004"
      - "${IB_VNC_PORT:-5900}:5900"
    environment:
      TWS_USERID: ${TWS_USERID:-}
      TWS_PASSWORD: ${TWS_PASSWORD:-}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      READ_ONLY_API: ${IB_READ_ONLY_API:-false}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-restart}
      TWOFA_EXIT_INTERVAL: ${TWOFA_EXIT_INTERVAL:-180}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-primary}
    networks:
      - sam-net
    profiles:
      - ib
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4004'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  sam-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.services
    image: sam-services:latest
    container_name: sam-services
    restart: unless-stopped
    ports:
      - "${SAM_SERVICES_PORT:-8080}:8080"
    networks:
      - sam-net
    volumes:
      - ../config:/opt/sam_trader/config:ro
      - ../logs:/opt/sam_trader/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PYTHONPATH=/opt/sam_trader/src
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-sam-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-sam_trader}
      - POSTGRES_USER=${POSTGRES_USER:-sam}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sam_secret}
      - REDIS_HOST=${REDIS_HOST:-sam-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    profiles:
      - services
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  futu_opend_data:
    driver: local

networks:
  sam-net:
    driver: bridge
