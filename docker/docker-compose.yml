services:
  # Placeholder for sam-trader (Nautilus TradingNode)
  # Defined in ticket: sam-p0-compose, sam-p0-dockerfile

  # Placeholder for sam-postgres
  # Defined in ticket: sam-p0-postgres

  sam-redis:
    image: redis:7-alpine
    container_name: sam-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sam-net
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Placeholder for sam-ib-gateway
  # Defined in ticket: sam-p5-ib-gateway

  # Placeholder for sam-services
  # Defined in ticket: sam-p8-dockerfile

  sam-futu-opend:
    image: futuopen/futu-opend:latest
    container_name: sam-futu-opend
    restart: unless-stopped
    ports:
      - "${FUTU_OPEND_PORT:-11111}:11111"
    environment:
      FUTU_LOGIN_ACCOUNT: ${FUTU_LOGIN_ACCOUNT:-}
      FUTU_LOGIN_PWD_MD5: ${FUTU_LOGIN_PWD_MD5:-}
      FUTU_TRADE_PASSWORD: ${FUTU_TRADE_PASSWORD:-}
      FUTU_RSA_PRIVATE_KEY: ${FUTU_RSA_PRIVATE_KEY:-}
    volumes:
      - futu_opend_data:/data
    networks:
      - sam-net
    profiles:
      - futu
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/11111"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis_data:
    driver: local
  futu_opend_data:
    driver: local

networks:
  sam-net:
    driver: bridge
