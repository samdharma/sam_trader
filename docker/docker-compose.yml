services:
  # Placeholder for sam-trader (Nautilus TradingNode)
  # Defined in ticket: sam-p0-compose, sam-p0-dockerfile

  # Placeholder for sam-postgres
  # Defined in ticket: sam-p0-postgres

  # Placeholder for sam-redis
  # Defined in ticket: sam-p0-redis

  # Placeholder for sam-ib-gateway
  # Defined in ticket: sam-p5-ib-gateway

  # Placeholder for sam-services
  # Defined in ticket: sam-p8-dockerfile

  sam-futu-opend:
    image: futuopen/futu-opend:latest
    container_name: sam-futu-opend
    restart: unless-stopped
    ports:
      - "${FUTU_OPEND_PORT:-11111}:11111"
    environment:
      FUTU_LOGIN_ACCOUNT: ${FUTU_LOGIN_ACCOUNT:-}
      FUTU_LOGIN_PWD_MD5: ${FUTU_LOGIN_PWD_MD5:-}
      FUTU_TRADE_PASSWORD: ${FUTU_TRADE_PASSWORD:-}
      FUTU_RSA_PRIVATE_KEY: ${FUTU_RSA_PRIVATE_KEY:-}
    volumes:
      - futu_opend_data:/data
    networks:
      - sam-net
    profiles:
      - futu
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/11111"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  futu_opend_data:
    driver: local

networks:
  sam-net:
    driver: bridge
