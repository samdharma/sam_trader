# SAM Trader V3 — Example strategy bundles (multi-venue)
#
# Copy this file to config/bundles.yaml and edit for your deployment.
# All bundles are loaded at TradingNode build time.

bundles:
  # ---------------------------------------------------------------------------
  # Futu bundles
  # ---------------------------------------------------------------------------

  # US equity — Opening Range Breakout on TSLA
  - id: "tsla-orb-15m-futu"
    enabled: true
    venue: FUTU
    market: US
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "TSLA.NASDAQ"
        bar_type: "TSLA.NASDAQ-15-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 15
        trade_size: 5
    bracket:
      stop_loss_ticks: 10
      take_profit_ticks: 30
    risk:
      max_position: 500
      max_daily_loss: 1000
      max_trades_per_day: 5
      trade_cooldown_seconds: 300

  # HK equity — Opening Range Breakout on Tencent (disabled by default)
  - id: "tencent-orb-5m-futu"
    enabled: false
    venue: FUTU
    market: HK
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "00700.HKEX"
        bar_type: "00700.HKEX-5-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 5
        trade_size: 100
    bracket:
      stop_loss_ticks: 20
      take_profit_ticks: 60
    risk:
      max_position: 1000
      max_daily_loss: 5000

  # ---------------------------------------------------------------------------
  # Versioned bundles (same strategy class, different configs)
  # ---------------------------------------------------------------------------

  # ORB aggressive variant — v1.0
  - id: "orb-aggressive-tsla"
    enabled: false
    venue: FUTU
    family: ORB_aggressive
    version: "1.0.0"
    variant: aggressive
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "TSLA.NASDAQ"
        bar_type: "TSLA.NASDAQ-5-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 5
        trade_size: 20
    bracket:
      stop_loss_ticks: 5
      take_profit_ticks: 15
    risk:
      max_position: 1000
      max_daily_loss: 2000

  # ORB bearish variant — v1.3
  - id: "orb-bearish-tsla"
    enabled: false
    venue: FUTU
    family: ORB_bearish
    version: "1.3.0"
    variant: bearish
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "TSLA.NASDAQ"
        bar_type: "TSLA.NASDAQ-15-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 15
        trade_size: 10
    bracket:
      stop_loss_ticks: 12
      take_profit_ticks: 25
    risk:
      max_position: 500
      max_daily_loss: 1000

  # ---------------------------------------------------------------------------
  # IBKR bundles
  # ---------------------------------------------------------------------------

  # US equity — Momentum strategy on NVDA (disabled by default)
  - id: "nvda-momentum-5m-ib"
    enabled: false
    venue: IB
    market: US
    strategy:
      path: sam_trader.strategies.momentum:MomentumStrategy
      config:
        instrument_id: "NVDA.NASDAQ"
        bar_type: "NVDA.NASDAQ-5-MINUTE-LAST-INTERNAL"
        window: 20
        session_start: "09:30:00"
        session_end: "16:00:00"
        trade_size: 50
        entry_order_type: "LIMIT"       # MARKET | LIMIT | STOP_MARKET
        allowed_directions: ["LONG"]    # Fallback to long-only if shorts blocked
    bracket:
      stop_loss_ticks: 15
      take_profit_ticks: 45
    risk:
      max_position: 200
      max_daily_loss: 500

  # IB bundle with explicit SMART routing (default) and exchange override example
  - id: "aapl-orb-15m-ib"
    enabled: false
    venue: IB
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "AAPL.NASDAQ"
        bar_type: "AAPL.NASDAQ-15-MINUTE-LAST-INTERNAL"
        first_candle_minutes: 15
        trade_size: 10
        entry_order_type: "LIMIT"
    bracket:
      stop_loss_ticks: 10
      take_profit_ticks: 30
    risk:
      max_position: 100
      max_daily_loss: 250
    # exchange: "NASDAQ"  # Optional: default is SMART; uncomment for direct routing
