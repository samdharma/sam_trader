# SAM Trader V3 — Example strategy bundles (multi-venue)
#
# Copy this file to config/bundles.yaml and edit for your deployment.
# All bundles are loaded at TradingNode build time.

bundles:
  # ---------------------------------------------------------------------------
  # Futu bundles
  # ---------------------------------------------------------------------------

  # US equity — Opening Range Breakout on TSLA
  - id: "tsla-orb-15m-futu"
    enabled: true
    venue: FUTU
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "TSLA.NASDAQ"
        bar_type: "TSLA.NASDAQ-15-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 15
        trade_size: 5
    bracket:
      stop_loss_ticks: 10
      take_profit_ticks: 30
    risk:
      max_position: 500
      max_daily_loss: 1000

  # HK equity — Opening Range Breakout on Tencent (disabled by default)
  - id: "tencent-orb-5m-futu"
    enabled: false
    venue: FUTU
    strategy:
      path: sam_trader.strategies.orb:OrbStrategy
      config:
        instrument_id: "00700.HKEX"
        bar_type: "00700.HKEX-5-MINUTE-LAST-EXTERNAL"
        first_candle_minutes: 5
        trade_size: 100
    bracket:
      stop_loss_ticks: 20
      take_profit_ticks: 60
    risk:
      max_position: 1000
      max_daily_loss: 5000

  # ---------------------------------------------------------------------------
  # IBKR bundles
  # ---------------------------------------------------------------------------

  # US equity — Momentum strategy on NVDA (disabled by default)
  - id: "nvda-momentum-5m-ib"
    enabled: false
    venue: IB
    strategy:
      path: sam_trader.strategies.momentum:MomentumStrategy
      config:
        instrument_id: "NVDA.NASDAQ"
        bar_type: "NVDA.NASDAQ-5-MINUTE-LAST-INTERNAL"
        window: 20
        session_start: "09:30:00"
        session_end: "16:00:00"
        trade_size: 50
    bracket:
      stop_loss_ticks: 15
      take_profit_ticks: 45
    risk:
      max_position: 200
      max_daily_loss: 500
